<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>תודה! – יראל כברה</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:       #0a0a08;
      --ink-2:     #1a1a16;
      --smoke:     #F6F7F7;
      --cream:     #F6F7F7;
      --paper:     #ffffff;
      --gold:      #6924E8;
      --gold-2:    #BAA8E5;
      --blue-dark: #183152;
      --blue-mid:  #375D81;
      --blue-light:#ABC8E2;
      --muted:     #7a7870;
      --border:    rgba(10,10,8,.10);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:"Varela Round", sans-serif;
      background:var(--ink);
      color:var(--cream);
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
      background-size:72px 72px;
    }

    body::before{
      content:'';
      position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(circle at 10% 30%,rgba(55,93,129,.18) 0%,transparent 50%),
        radial-gradient(circle at 90% 70%,rgba(24,49,82,.15) 0%,transparent 48%);
    }

    /* Landscape block */
    .landscape-block{
      position:fixed;inset:0;display:none;
      align-items:center;justify-content:center;
      background:var(--ink);z-index:99999;padding:32px;
    }
    .lb-inner{
      text-align:center;max-width:380px;
      border:1px solid rgba(255,255,255,.08);
      background:var(--ink-2);
      border-radius:12px;padding:40px 32px;
    }
    .lb-icon{font-size:36px;margin-bottom:16px}
    .lb-h{font-size:22px;margin-bottom:10px;color:var(--cream)}
    .lb-p{font-size:14px;color:rgba(246,247,247,.55);line-height:1.8}
    @media(orientation:landscape)and(max-width:980px){
      body{overflow:hidden}
      .landscape-block{display:flex}
    }

    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 16px 60px;
      position:relative;
      z-index:1;
    }

    .card{
      width:min(640px,100%);
      border-radius:24px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
      box-shadow:0 32px 80px rgba(0,0,0,.55);
      padding:48px 40px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:'';
      position:absolute;top:0;right:0;left:0;height:3px;
      background:linear-gradient(90deg,var(--blue-dark),var(--blue-mid),var(--blue-light));
    }


    .check-wrap{
      width:72px;height:72px;
      border-radius:50%;
      background:rgba(55,93,129,.2);
      border:2px solid var(--blue-mid);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 24px;
      animation:pop .5s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes pop{
      from{transform:scale(0);opacity:0}
      to{transform:scale(1);opacity:1}
    }

    .check-wrap svg{
      width:34px;height:34px;
      stroke:var(--blue-light);
      stroke-width:2.5;
      fill:none;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    h1{
      font-size:clamp(26px,6vw,36px);
      color:var(--cream);
      margin-bottom:12px;
      line-height:1.2;
    }

    .subtitle{
      font-size:clamp(15px,3vw,17px);
      color:var(--blue-light);
      margin-bottom:20px;
      text-shadow:0 0 10px rgba(171,200,226,0.5);
    }

    p{
      font-size:15px;
      line-height:1.9;
      color:rgba(246,247,247,.65);
      max-width:48ch;
      margin:0 auto 28px;
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.08) 30%,rgba(255,255,255,.08) 70%,transparent);
      margin:0 0 28px;
    }

    .wa-label{
      font-size:13px;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:rgba(246,247,247,.4);
      margin-bottom:14px;
    }

    .btnrow{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:13px 22px;
      border-radius:6px;
      font-family:"Varela Round",sans-serif;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      border:none;
      text-decoration:none;
      transition:transform .2s ease,box-shadow .2s ease;
      -webkit-tap-highlight-color:transparent;
    }

    .btn:hover{transform:translateY(-2px)}

    .btn-wa{
      background:#25D366;
      color:#fff;
      box-shadow:0 8px 24px rgba(37,211,102,.25);
    }
    .btn-wa:hover{box-shadow:0 14px 36px rgba(37,211,102,.38)}

    .btn-back{
      background:var(--blue-dark);
      color:var(--cream);
      border:1px solid rgba(255,255,255,.1);
      box-shadow:0 8px 24px rgba(0,0,0,.25);
    }
    .btn-back:hover{background:var(--blue-mid)}

    .wa-icon{
      width:18px;height:18px;
      fill:#fff;flex-shrink:0;
    }

    footer{
      margin-top:32px;
      padding-top:20px;
      border-top:1px solid rgba(255,255,255,.07);
      font-size:13px;
      color:rgba(246,247,247,.3);
    }

    @media(max-width:520px){
      .card{padding:32px 20px;border-radius:20px}
      .btnrow{flex-direction:column;align-items:stretch}
      .btn{justify-content:center}
    }
  </style>
</head>

<body>
  <div class="landscape-block">
    <div class="lb-inner">
      <div class="lb-icon">📱</div>
      <h2 class="lb-h">לצפייה מיטבית</h2>
      <p class="lb-p">סובבו את הטלפון למצב אנכי (Portrait) לחוויה הטובה ביותר.</p>
    </div>
  </div>

  <div class="wrap">
    <main class="card">

      <div class="check-wrap" aria-hidden="true">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>

      <h1>תודה שהשארתם פרטים!</h1>
      <p class="subtitle">חוזר אליכם בקרוב 🙌</p>

      <p>קיבלתי את הפנייה שלכם ואחזור אליכם בהקדם לשיחת התאמה קצרה.</p>

      <div class="divider"></div>

      <div class="wa-label">חסרי סבלנות? דברו איתי ישירות</div>

      <div class="btnrow">
        <a class="btn btn-wa"
           href="https://wa.me/972543944984?text=%D7%94%D7%99%D7%99%20%D7%99%D7%A8%D7%90%D7%9C%2C%20%D7%94%D7%A9%D7%90%D7%A8%D7%AA%D7%99%20%D7%A4%D7%A8%D7%98%D7%99%D7%9D%20%D7%91%D7%90%D7%AA%D7%A8%20%D7%95%D7%90%D7%A9%D7%9E%D7%97%20%D7%9C%D7%AA%D7%90%D7%9D%20%D7%A9%D7%99%D7%97%D7%94"
           target="_blank" rel="noopener">
          <svg class="wa-icon" viewBox="0 0 32 32" aria-hidden="true">
            <path d="M19.11 17.53c-.27-.13-1.6-.79-1.85-.88-.25-.09-.44-.13-.62.13-.18.27-.71.88-.87 1.06-.16.18-.32.2-.59.07-.27-.13-1.13-.42-2.15-1.34-.79-.7-1.33-1.56-1.49-1.82-.16-.27-.02-.41.12-.54.12-.12.27-.32.41-.48.13-.16.18-.27.27-.44.09-.18.04-.33-.02-.46-.07-.13-.62-1.5-.85-2.06-.22-.53-.44-.46-.62-.46h-.53c-.18 0-.46.07-.7.33-.25.27-.93.91-.93 2.22 0 1.31.96 2.58 1.09 2.75.13.18 1.89 2.89 4.58 4.06.64.28 1.14.44 1.53.56.64.2 1.22.17 1.68.1.51-.08 1.6-.65 1.82-1.28.22-.62.22-1.16.16-1.28-.07-.12-.25-.2-.52-.33z"/>
            <path d="M27.44 4.56C24.52 1.62 20.63 0 16.5 0 8.23 0 1.5 6.73 1.5 15c0 2.64.69 5.22 2.01 7.49L1.37 32l9.73-2.55A14.93 14.93 0 0 0 16.5 30c8.27 0 15-6.73 15-15 0-4.13-1.62-8.02-4.56-10.44zm-10.94 23A12.4 12.4 0 0 1 11 25.98l-.39-.23-5.78 1.52 1.54-5.64-.25-.41A12.42 12.42 0 0 1 4.1 15c0-6.84 5.56-12.4 12.4-12.4 3.31 0 6.43 1.29 8.77 3.63A12.33 12.33 0 0 1 28.9 15c0 6.84-5.56 12.56-12.4 12.56z"/>
          </svg>
          שלחו הודעה בוואטסאפ
        </a>

        <a class="btn btn-back" href="index.html">חזרה לאתר</a>
      </div>

      <footer>© <span id="year"></span> יראל כברה – כל הזכויות שמורות</footer>
    </main>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
